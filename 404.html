<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 &mdash; ARYX Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020408;--glow:#00d4ff;--glow2:#0077ff;
  --text:#c8dde8;--muted:#3a5565;--white:#e8f4ff;
  --border:#0d2235;--card:#07111c;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.022) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:0;
}
.wrap{position:relative;z-index:2;padding:40px 24px;}
.err-code{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(80px,20vw,160px);font-weight:900;line-height:1;
  color:transparent;
  -webkit-text-stroke:2px var(--glow);
  text-shadow:0 0 60px rgba(0,212,255,0.15);
  margin-bottom:24px;
}
.err-label{
  font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:5px;color:var(--glow);text-transform:uppercase;
  margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px;
}
.err-label::before,.err-label::after{content:'';display:block;width:30px;height:1px;background:var(--glow);box-shadow:0 0 8px var(--glow);}
.err-msg{
  font-size:15px;line-height:1.8;color:var(--muted);
  max-width:400px;margin:0 auto 40px;font-weight:300;
}
.home-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 36px;
  background:linear-gradient(135deg,var(--glow2),var(--glow));
  color:#020408;font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  text-decoration:none;font-weight:700;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:box-shadow 0.3s,transform 0.2s;
}
.home-btn:hover{box-shadow:0 0 40px rgba(0,212,255,0.5);transform:translateY(-2px);}
.logo{
  font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;
  letter-spacing:4px;color:var(--white);margin-bottom:48px;
}
.logo span{color:var(--glow);text-shadow:0 0 16px var(--glow);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">ARY<span>X</span> CO.</div>
  <div class="err-label">Error</div>
  <div class="err-code">404</div>
  <p class="err-msg">This page doesn't exist or has been moved. Head back to the main site.</p>
  <a href="/" class="home-btn">&#8592; Back to Home</a>
</div>
</body>
</html>
